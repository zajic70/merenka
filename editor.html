<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor měr – VAVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .figbox { background:#fff; border:1px solid #ddd; border-radius:.5rem; }
        .figbox svg { width:100%; height:auto; }
        .mira-marker { cursor: move; }
        .mira-marker:hover .num, .mira-marker.sel .num { fill:#0d6efd; font-weight:800; }
        .mira-marker.sel line:not(.lead), .mira-marker.sel path:not(.lead), .mira-marker.sel ellipse { stroke:#0d6efd; }
        /* úchyty */
        .ui { cursor: pointer; }
        .ui-move { fill: transparent; }
        .ui-rx, .ui-ry { fill:#198754; stroke:#fff; stroke-width:.6; }      /* zelené = šířka/výška elipsy */
        .ui-pt { fill:#0d6efd; stroke:#fff; stroke-width:.6; }              /* modré = konce úseček */
        .ui-path { fill:#fd7e14; stroke:#fff; stroke-width:.6; }            /* oranžové = body šipek (křivek) */
        #panel { position: sticky; top: 1rem; max-height: 94vh; overflow:auto; }
        #readout { font-size:.78rem; }
        #readout tr.active { background:#fff3cd; }
        .leg { font-size:.75rem; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid my-3">
    <h1 class="h5 mb-1">Editor měr</h1>
    <p class="leg text-muted mb-3">
        Číslo = posun celé míry &nbsp;•&nbsp;
        <span class="text-success">●</span> zelený čtvereček = šířka/výška elipsy &nbsp;•&nbsp;
        <span class="text-primary">●</span> modrý = konec úsečky &nbsp;•&nbsp;
        <span style="color:#fd7e14">●</span> oranžový = bod šipky (začátek/ohyb/konec). Po vybrání lze jemně šipkami ←→↑↓.
    </p>
    <div class="row g-3">
        <div class="col-lg-8"><div id="figury" class="row g-3"></div></div>
        <div class="col-lg-4">
            <div id="panel" class="card shadow-sm">
                <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
                    <span>Změny</span>
                    <span>
                        <button id="btnCara" class="btn btn-sm btn-outline-success">+ čára</button>
                        <button id="btnSmaz" class="btn btn-sm btn-outline-danger">− smazat</button>
                        <button id="btnReset" class="btn btn-sm btn-outline-secondary">Reset</button>
                        <button id="btnExport" class="btn btn-sm btn-primary">Export</button>
                    </span>
                </div>
                <div class="card-body p-2">
                    <p class="small text-muted mb-2">Vybráno: <strong id="selName">—</strong></p>
                    <table class="table table-sm" id="readout"><tbody></tbody></table>
                    <textarea id="exportBox" class="form-control font-monospace" rows="10" readonly
                              placeholder="Po stisku Export se sem vypíšou upravené míry – zkopíruj a pošli mi je."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    'use strict';
    var SVGNS='http://www.w3.org/2000/svg';
    var NAMES = {
        muz:{1:'výška postavy',2:'obvod krku',3:'obvod hrudníku',4:'obvod pasu',5:'obvod sedu',6:'délka ramene a ruky',7:'obvod paže',8:'obvod stehna',9:'šíře zad',10:'kroková délka'},
        zena:{1:'výška postavy',2:'obvod hrudníku',3:'obvod pasu',4:'obvod sedu',5:'délka ramene a ruky',6:'obvod paže',7:'obvod stehna',8:'kroková délka'}
    };
    function nazev(m){var p=m.split('-');if(p[0]==='cara')return 'pomocná čára';return (NAMES[p[0]==='zena'?'zena':'muz'][+p[1]]||m);}

    var changed = new Set();   // změněné markery (elementy)
    var selected = null;

    function getLocal(refEl, e){
        var svg=refEl.ownerSVGElement||refEl;
        var pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
        return pt.matrixTransform(refEl.getScreenCTM().inverse());
    }
    function parseTranslate(g){
        var t=g.getAttribute('transform')||''; var m=t.match(/translate\(\s*(-?[\d.]+)[ ,]+(-?[\d.]+)/);
        return m?[parseFloat(m[1]),parseFloat(m[2])]:[0,0];
    }
    function setTranslate(g,x,y){ g.setAttribute('transform','translate('+Math.round(x)+','+Math.round(y)+')'); }
    var POCET={M:1,L:1,T:1,Q:2,S:2,C:3,Z:0};
    function parsePath(d){
        var tok=d.match(/[a-zA-Z]|-?\d*\.?\d+/g); if(!tok) return null;
        var segs=[], i=0;
        while(i<tok.length){
            var cmd=tok[i++]; if(!/[a-zA-Z]/.test(cmd)) return null;
            var n=POCET[cmd.toUpperCase()]; if(n===undefined) return null;
            var coords=[];
            for(var k=0;k<n;k++){ coords.push([parseFloat(tok[i++]),parseFloat(tok[i++])]); }
            segs.push({cmd:cmd,coords:coords});
        }
        return segs;
    }
    function buildPath(segs){
        return segs.map(function(s){ return s.cmd + s.coords.map(function(c){return c[0]+','+c[1];}).join(' '); }).join(' ');
    }

    fetch('index.html').then(function(r){return r.text();}).then(function(html){
        var doc=new DOMParser().parseFromString(html,'text/html');
        var svgs=doc.querySelectorAll('.figure-svg');
        var wrap=document.getElementById('figury');
        var T={'muz':'Muž – zepředu','muz-zad':'Muž – zezadu','zena':'Žena – zepředu'};
        svgs.forEach(function(svg){
            var fig=svg.getAttribute('data-fig');
            var col=document.createElement('div'); col.className='col-md-4';
            col.innerHTML='<div class="figbox p-2"><div class="small text-secondary text-center mb-1">'+(T[fig]||fig)+'</div></div>';
            col.querySelector('.figbox').appendChild(svg);
            wrap.appendChild(col);
            svg.querySelectorAll('.mira-marker').forEach(vybavMarker);
        });
        renderReadout();
    });

    function H(cls,x,y,s){var r=document.createElementNS(SVGNS,'rect');r.setAttribute('class','ui '+cls);r.setAttribute('width',s);r.setAttribute('height',s);r.setAttribute('x',x-s/2);r.setAttribute('y',y-s/2);return r;}

    function vybavMarker(m){
        m._handles=[];
        // 1) posun celé míry – průhledné kolečko u čísla
        var num=m.querySelector('.num');
        if(num){
            var c=document.createElementNS(SVGNS,'circle');
            c.setAttribute('class','ui ui-move');
            c.setAttribute('cx',num.getAttribute('x')); c.setAttribute('cy',num.getAttribute('y')); c.setAttribute('r',12);
            m.appendChild(c);
            dragMove(c,m);
        }
        // 2) elipsy – úchyt šířky (rx) a výšky (ry)
        m.querySelectorAll('ellipse').forEach(function(el){
            var hx=H('ui-rx',0,0,5), hy=H('ui-ry',0,0,5);
            m.appendChild(hx); m.appendChild(hy);
            m._handles.push({el:el,hx:hx,hy:hy});
            dragEllipse(hx,m,el,'rx'); dragEllipse(hy,m,el,'ry');
        });
        // 3) úsečky (ne lead) – konce
        m.querySelectorAll('line').forEach(function(ln){
            if(ln.classList.contains('lead')) return;
            var p1=H('ui-pt',0,0,5), p2=H('ui-pt',0,0,5);
            m.appendChild(p1); m.appendChild(p2);
            m._handles.push({el:ln,p1:p1,p2:p2});
            dragPoint(p1,m,ln,1); dragPoint(p2,m,ln,2);
        });
        // 4) šipky (path, ne lead/thin) – body křivky
        m.querySelectorAll('path').forEach(function(pth){
            if(pth.classList.contains('lead')||pth.classList.contains('thin')) return;
            var segs=parsePath(pth.getAttribute('d')); if(!segs) return;
            var pts=[]; segs.forEach(function(s){ s.coords.forEach(function(c,i){ pts.push({seg:s,idx:i}); }); });
            pth._segs=segs;
            var handles=pts.map(function(){ var h=H('ui-path',0,0,5); m.appendChild(h); return h; });
            m._handles.push({el:pth,path:true,segs:segs,pts:pts,handles:handles});
            handles.forEach(function(h,i){ dragPathPt(h,m,pth,pts[i]); });
        });
        polohujHandly(m);
    }

    function polohujHandly(m){
        (m._handles||[]).forEach(function(h){
            if(h.hx){
                var cx=+h.el.getAttribute('cx'),cy=+h.el.getAttribute('cy'),rx=+h.el.getAttribute('rx'),ry=+h.el.getAttribute('ry');
                h.hx.setAttribute('x',cx+rx-2.5); h.hx.setAttribute('y',cy-2.5);
                h.hy.setAttribute('x',cx-2.5);    h.hy.setAttribute('y',cy-ry-2.5);
            } else if(h.p1){
                h.p1.setAttribute('x',(+h.el.getAttribute('x1'))-2.5); h.p1.setAttribute('y',(+h.el.getAttribute('y1'))-2.5);
                h.p2.setAttribute('x',(+h.el.getAttribute('x2'))-2.5); h.p2.setAttribute('y',(+h.el.getAttribute('y2'))-2.5);
            } else if(h.path){
                h.handles.forEach(function(hh,i){ var c=h.pts[i].seg.coords[h.pts[i].idx]; hh.setAttribute('x',c[0]-2.5); hh.setAttribute('y',c[1]-2.5); });
            }
        });
    }

    function oznac(m){
        document.querySelectorAll('.mira-marker.sel').forEach(function(x){x.classList.remove('sel');});
        m.classList.add('sel'); selected=m;
        document.getElementById('selName').textContent=m.dataset.mira+' · '+nazev(m.dataset.mira);
    }
    function zmena(m){ changed.add(m); renderReadout(); }

    function dragMove(handle,m){
        var start,base;
        handle.addEventListener('pointerdown',function(e){e.preventDefault();e.stopPropagation();oznac(m);start=getLocal(m.parentNode,e);base=parseTranslate(m);handle.setPointerCapture(e.pointerId);});
        handle.addEventListener('pointermove',function(e){if(!start)return;var p=getLocal(m.parentNode,e);setTranslate(m,base[0]+(p.x-start.x),base[1]+(p.y-start.y));zmena(m);});
        handle.addEventListener('pointerup',function(e){start=null;try{handle.releasePointerCapture(e.pointerId);}catch(_){}})
    }
    function dragEllipse(handle,m,el,kind){
        var active=false;
        handle.addEventListener('pointerdown',function(e){e.preventDefault();e.stopPropagation();oznac(m);active=true;handle.setPointerCapture(e.pointerId);});
        handle.addEventListener('pointermove',function(e){if(!active)return;var p=getLocal(m,e);var cx=+el.getAttribute('cx'),cy=+el.getAttribute('cy');
            if(kind==='rx'){el.setAttribute('rx',Math.max(2,Math.round(Math.abs(p.x-cx))));}
            else {el.setAttribute('ry',Math.max(2,Math.round(Math.abs(cy-p.y))));}
            polohujHandly(m);zmena(m);});
        handle.addEventListener('pointerup',function(e){active=false;try{handle.releasePointerCapture(e.pointerId);}catch(_){}})
    }
    function dragPoint(handle,m,ln,which){
        var active=false;
        handle.addEventListener('pointerdown',function(e){e.preventDefault();e.stopPropagation();oznac(m);active=true;handle.setPointerCapture(e.pointerId);});
        handle.addEventListener('pointermove',function(e){if(!active)return;var p=getLocal(m,e);
            ln.setAttribute('x'+which,Math.round(p.x)); ln.setAttribute('y'+which,Math.round(p.y));
            polohujHandly(m);zmena(m);});
        handle.addEventListener('pointerup',function(e){active=false;try{handle.releasePointerCapture(e.pointerId);}catch(_){}})
    }
    function dragPathPt(handle,m,pth,pt){
        var active=false;
        handle.addEventListener('pointerdown',function(e){e.preventDefault();e.stopPropagation();oznac(m);active=true;handle.setPointerCapture(e.pointerId);});
        handle.addEventListener('pointermove',function(e){if(!active)return;var p=getLocal(m,e);
            pt.seg.coords[pt.idx]=[Math.round(p.x),Math.round(p.y)];
            pth.setAttribute('d',buildPath(pth._segs));
            polohujHandly(m);zmena(m);});
        handle.addEventListener('pointerup',function(e){active=false;try{handle.releasePointerCapture(e.pointerId);}catch(_){}})
    }

    // jemný posun celé míry šipkami
    document.addEventListener('keydown',function(e){
        if(!selected)return; var d={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]}[e.key]; if(!d)return;
        e.preventDefault(); var b=parseTranslate(selected); setTranslate(selected,b[0]+d[0],b[1]+d[1]); zmena(selected);
    });

    function renderReadout(){
        var tb=document.querySelector('#readout tbody'); tb.innerHTML='';
        changed.forEach(function(m){
            var svg=m.ownerSVGElement; var fig=svg.getAttribute('data-fig');
            var tr=document.createElement('tr'); if(m===selected)tr.className='active';
            tr.innerHTML='<td class="text-muted">'+fig+'</td><td>'+m.dataset.mira+' · '+nazev(m.dataset.mira)+'</td>';
            tb.appendChild(tr);
        });
        if(!changed.size) tb.innerHTML='<tr><td class="text-muted small">Zatím nic nezměněno.</td></tr>';
    }

    function cisty(m){
        var clone=m.cloneNode(true);
        clone.classList.remove('sel');
        clone.querySelectorAll('.ui').forEach(function(x){x.remove();});
        return clone.outerHTML.replace(/\s+/g,' ').replace(/> </g,'>\n  <');
    }

    // ---- Pomocné čáry (přidat / smazat) ----
    var caraN=0;
    document.getElementById('btnCara').addEventListener('click', function(){
        var svg = selected ? selected.ownerSVGElement : document.querySelector('.figure-svg');
        if(!svg) return;
        var dims = svg.querySelector('.dims') || svg;
        var g=document.createElementNS(SVGNS,'g'); g.setAttribute('class','mira-marker'); g.setAttribute('data-mira','cara-'+(++caraN));
        var ln=document.createElementNS(SVGNS,'line'); ln.setAttribute('class','pomoc');
        ln.setAttribute('x1',70); ln.setAttribute('y1',150); ln.setAttribute('x2',140); ln.setAttribute('y2',150);
        g.appendChild(ln); dims.appendChild(g);
        vybavMarker(g); oznac(g); zmena(g);
    });
    document.getElementById('btnSmaz').addEventListener('click', function(){
        if(!selected || String(selected.dataset.mira).indexOf('cara-')!==0){ alert('Smazat lze jen vybranou pomocnou čáru.'); return; }
        changed.delete(selected); selected.remove(); selected=null;
        document.getElementById('selName').textContent='—'; renderReadout();
    });
    document.getElementById('btnExport').addEventListener('click',function(){
        var out=[]; var byFig={};
        changed.forEach(function(m){var f=m.ownerSVGElement.getAttribute('data-fig');(byFig[f]=byFig[f]||[]).push(m);});
        Object.keys(byFig).forEach(function(f){
            out.push('=== '+f+' ===');
            byFig[f].forEach(function(m){ out.push(cisty(m)); });
        });
        document.getElementById('exportBox').value = out.join('\n\n') || '(nic nezměněno)';
    });
    document.getElementById('btnReset').addEventListener('click',function(){ location.reload(); });
})();
</script>
</body>
</html>
